<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>智慧食堂</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2F5BEA;
      --secondary: #EEF3FF;
      --accent: #F59E0B;
      --success: #22C55E;
      --bg: #F6F7FB;
      --text-main: #1F2937;
      --text-muted: #6B7280;
      --border: #E5E7EB;
    }
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      overflow: hidden; /* 防止 Body 滚动，由 Main 容器处理 */
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text-main);
      -webkit-tap-highlight-color: transparent;
    }
    /* 极致平滑动画，解决切换抖动 */
    .page-transition {
      animation: fadeInSubtle 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      backface-visibility: hidden;
      will-change: transform, opacity;
    }
    @keyframes fadeInSubtle {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    main {
      -webkit-overflow-scrolling: touch;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .btn-primary { background-color: var(--primary); color: white; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19.0.0",
      "react/": "https://esm.sh/react@19.0.0/",
      "react-dom": "https://esm.sh/react-dom@19.0.0",
      "react-dom/": "https://esm.sh/react-dom@19.0.0/",
      "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
      "react-router-dom": "https://esm.sh/react-router-dom@7.1.5?deps=react@19.0.0,react-dom@19.0.0",
      "lucide-react": "https://esm.sh/lucide-react@0.463.0?deps=react@19.0.0",
      "clsx": "https://esm.sh/clsx@2.1.1",
      "tailwind-merge": "https://esm.sh/tailwind-merge@2.3.0"
    }
  }
  </script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
