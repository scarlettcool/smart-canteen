openapi: 3.0.3
info:
  title: 智慧食堂用户端 API 规范
  description: 覆盖移动端 H5 涉及的所有业务逻辑，包括实名认证、钱包、订单、预约及后台数据闭环。
  version: 3.1.0
servers:
  - url: /api/v1
    description: 生产环境基地址

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        message:
          type: string
        errorCode:
          type: string
          description: 参考 error-codes.md

    IdempotentRequest:
      type: object
      required:
        - requestId
      properties:
        requestId:
          type: string
          format: uuid
          description: 客户端生成的唯一 ID，用于重试幂等

paths:
  /auth/register:
    post:
      summary: 提交员工注册申请
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone, staffId, department]
              properties:
                name: { type: string, minLength: 2 }
                phone: { type: string, pattern: '^1[3-9]\d{9}$' }
                staffId: { type: string, minLength: 8 }
                department: { type: string }
      responses:
        '200':
          description: 申请成功，进入审核流
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /wallet/balance:
    get:
      summary: 获取账户余额 (SOT)
      security: [{ bearerAuth: [] }]
      tags: [Wallet]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance: { type: number, format: float }

  /wallet/recharge:
    post:
      summary: 余额充值
      security: [{ bearerAuth: [] }]
      tags: [Wallet]
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/IdempotentRequest'
                - type: object
                  properties:
                    amount: { type: number, minimum: 0.01 }
      responses:
        '200':
          description: 充值成功，返回流水号
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId: { type: string }

  /orders/checkout:
    post:
      summary: 点餐结算（扣款）
      security: [{ bearerAuth: [] }]
      tags: [Order]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [items, totalAmount]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      dishId: { type: string }
                      count: { type: integer }
                totalAmount: { type: number }
      responses:
        '200':
          description: 支付成功，返回取餐码
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId: { type: string }
                  pickupCode: { type: string }

  /reservations:
    post:
      summary: 创建就餐预约
      security: [{ bearerAuth: [] }]
      tags: [Reservation]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mealType: { type: string, enum: [breakfast, lunch, dinner] }
                dates: { type: array, items: { type: string, format: date } }
    get:
      summary: 获取预约记录列表
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }

  /queue/take:
    post:
      summary: 取号排队 (如理发)
      tags: [Queue]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  queueId: { type: string }
                  number: { type: string }
                  waitCount: { type: integer }

  /feedback:
    post:
      summary: 提交反馈/申诉
      tags: [Support]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string, enum: [suggestion, complaint, appeal] }
                content: { type: string }
                relatedId: { type: string, description: '关联的订单或预约ID' }
                images: { type: array, items: { type: string, format: base64 } }
