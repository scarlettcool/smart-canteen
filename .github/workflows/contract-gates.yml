name: Contract Lockdown Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================================================
  # Gate 1: OpenAPI → Shared Types Sync Check
  # ==========================================================================
  openapi-types-sync:
    name: "Gate 1: OpenAPI ↔ Shared Types Sync"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check if OpenAPI changed
        id: openapi-changed
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "SPEC/03_API_CONTRACT.openapi.yaml"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if shared-types regenerated
        if: steps.openapi-changed.outputs.changed == 'true'
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "shared/api-types"; then
            echo "✅ Shared types were regenerated"
          else
            echo "❌ GATE FAILED: OpenAPI changed but shared-types not regenerated!"
            echo ""
            echo "Please run: npm run generate:types"
            echo "Then commit the generated files in shared/api-types/"
            exit 1
          fi

  # ==========================================================================
  # Gate 2: DB Schema → Migration Check
  # ==========================================================================
  db-migration-sync:
    name: "Gate 2: DB Schema ↔ Migration Sync"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check if Prisma schema changed
        id: schema-changed
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "SPEC/02_DB_SCHEMA.prisma"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if migration exists
        if: steps.schema-changed.outputs.changed == 'true'
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "prisma/migrations/"; then
            echo "✅ Migration file was created"
          else
            echo "❌ GATE FAILED: DB schema changed but no migration file found!"
            echo ""
            echo "Please run: npx prisma migrate dev --name <migration_name>"
            echo "Then commit the migration files in prisma/migrations/"
            exit 1
          fi

  # ==========================================================================
  # Gate 3: Audit Log Coverage Check
  # ==========================================================================
  audit-log-coverage:
    name: "Gate 3: Audit Log Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install yaml

      - name: Check Audit Log Coverage
        run: node scripts/check-audit-coverage.js

  # ==========================================================================
  # Gate 4: RBAC Permission Binding Check
  # ==========================================================================
  rbac-binding-check:
    name: "Gate 4: RBAC Permission Binding"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install yaml

      - name: Check RBAC Permission Bindings
        run: node scripts/check-rbac-bindings.js

  # ==========================================================================
  # All Gates Summary
  # ==========================================================================
  gates-summary:
    name: "Contract Gates Summary"
    needs: [openapi-types-sync, db-migration-sync, audit-log-coverage, rbac-binding-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all gates passed
        run: |
          echo "=========================================="
          echo "       CONTRACT LOCKDOWN GATES           "
          echo "=========================================="
          echo ""
          echo "Gate 1 (OpenAPI→Types): ${{ needs.openapi-types-sync.result }}"
          echo "Gate 2 (Schema→Migration): ${{ needs.db-migration-sync.result }}"
          echo "Gate 3 (Audit Coverage): ${{ needs.audit-log-coverage.result }}"
          echo "Gate 4 (RBAC Binding): ${{ needs.rbac-binding-check.result }}"
          echo ""
          
          if [[ "${{ needs.openapi-types-sync.result }}" == "failure" ]] || \
             [[ "${{ needs.db-migration-sync.result }}" == "failure" ]] || \
             [[ "${{ needs.audit-log-coverage.result }}" == "failure" ]] || \
             [[ "${{ needs.rbac-binding-check.result }}" == "failure" ]]; then
            echo "❌ ONE OR MORE GATES FAILED!"
            exit 1
          else
            echo "✅ ALL GATES PASSED!"
          fi
