name: E2E Smoke Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for E2E tests'
        required: false
        default: 'http://localhost:3000'

env:
  NODE_VERSION: '20'
  BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:3000' }}

jobs:
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: smart_canteen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup database
        run: |
          npx prisma migrate deploy --schema=./SPEC/02_DB_SCHEMA.prisma
          npx prisma db seed --schema=./SPEC/02_DB_SCHEMA.prisma || true
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/smart_canteen_test

      - name: Start application
        run: |
          npm run build --if-present
          npm run start &
          npx wait-on http://localhost:3000 --timeout 120000
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/smart_canteen_test
          NODE_ENV: test

      - name: Run E2E smoke tests
        run: npm run e2e:ci
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            e2e/reports/
            test-results/
          retention-days: 7

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/reports/html/
          retention-days: 7

  e2e-summary:
    name: E2E Test Summary
    needs: e2e-smoke
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check E2E results
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║           E2E SMOKE TEST SUMMARY                 ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          
          if [[ "${{ needs.e2e-smoke.result }}" == "success" ]]; then
            echo "✅ All E2E smoke tests passed!"
            echo ""
            echo "Tests covered:"
            echo "  ✓ Admin Login"
            echo "  ✓ Personnel Archive CRUD"
            echo "  ✓ Personnel Import"
            echo "  ✓ Trade Ledger Export"
            echo "  ✓ Menu Publish/Revoke"
            echo "  ✓ Complaint Reply/Close"
            echo "  ✓ Operation Logs"
          else
            echo "❌ Some E2E tests failed!"
            echo "Please check the Playwright report artifact."
            exit 1
          fi
